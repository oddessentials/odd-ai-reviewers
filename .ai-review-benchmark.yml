# Benchmark-specific configuration
#
# Used by scripts/benchmark-adapter.ts when running the external benchmark.
# The benchmark clones real repos (grafana, sentry, cal.com, etc.) that don't
# have their own .ai-review.yml, so without this config the CLI falls back to
# zero-config with very restrictive limits (2000 diff lines, $0.10 budget)
# that silently skip most PRs.
#
# This config provides generous limits matching production usage and selects
# the provider available in the benchmark CI environment (ANTHROPIC_API_KEY).

version: 1
trusted_only: true

# Benchmark CI provides ANTHROPIC_API_KEY; fall back to openai if available
provider: anthropic

triggers:
  on: [pull_request]
  branches: [main]

passes:
  - name: cloud-ai
    agents: [opencode, pr_agent]
    enabled: true

models:
  default: claude-sonnet-4-20250514

limits:
  max_files: 150
  max_diff_lines: 100000
  max_tokens_per_pr: 700000
  max_usd_per_pr: 50.00
  monthly_budget_usd: 500

reporting: {}

gating:
  enabled: false
  fail_on_severity: error
