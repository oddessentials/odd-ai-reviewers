name: Benchmark

on:
  workflow_dispatch:
    inputs:
      judge_model:
        description: 'Model to use for judging (e.g., openai/gpt-4o-mini)'
        required: false
        default: 'openai/gpt-4o-mini'
  schedule:
    # Weekly: Sunday at 2 AM UTC
    - cron: '0 2 * * 0'

permissions:
  contents: read

jobs:
  benchmark:
    name: External Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Block fork PRs from accessing secrets
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Preflight secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MARTIAN_API_KEY: ${{ secrets.MARTIAN_API_KEY }}
        run: |
          missing=()
          [ -n "${ANTHROPIC_API_KEY}" ] || missing+=("ANTHROPIC_API_KEY")
          [ -n "${MARTIAN_API_KEY}" ] || missing+=("MARTIAN_API_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=Missing benchmark secrets::Missing required benchmark secrets: ${missing[*]}"
            echo "Benchmark preflight failed."
            echo "Missing required secrets:"
            for key in "${missing[@]}"; do
              echo "  - ${key}"
            done
            exit 1
          fi
          echo "Benchmark preflight passed. All required secrets are configured."

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Run external benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MARTIAN_API_KEY: ${{ secrets.MARTIAN_API_KEY }}
          MARTIAN_MODEL: ${{ inputs.judge_model || 'openai/gpt-4o-mini' }}
        run: |
          node --experimental-strip-types scripts/run-external-benchmark.ts \
            --benchmark-root /tmp/benchmark \
            --results-dir /tmp/benchmark-results \
            --judge-model "$MARTIAN_MODEL" \
            --concurrency 2 \
            --timeout-per-pr 300 \
            --max-runtime 6000

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmark-results-${{ github.run_id }}
          path: /tmp/benchmark-results/
          retention-days: 30
