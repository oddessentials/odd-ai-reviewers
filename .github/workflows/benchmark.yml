name: Benchmark

on:
  workflow_dispatch:
    inputs:
      judge_model:
        description: 'Model to use for judging (e.g., openai/gpt-4o-mini)'
        required: false
        default: 'openai/gpt-4o-mini'
  schedule:
    # Weekly: Sunday at 2 AM UTC
    - cron: '0 2 * * 0'

permissions:
  contents: read

jobs:
  benchmark:
    name: External Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Block fork PRs from accessing secrets
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Clone benchmark repo
        run: git clone --depth 1 https://github.com/withmartian/code-review-benchmark.git /tmp/benchmark

      - name: Run adapter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npx tsx scripts/benchmark-adapter.ts \
            --golden-dir /tmp/benchmark/golden \
            --output /tmp/benchmark-results/candidates.json \
            --concurrency 2 \
            --timeout-per-pr 300 \
            --max-runtime 6000

      - name: Run judge
        env:
          MARTIAN_API_KEY: ${{ secrets.MARTIAN_API_KEY }}
          JUDGE_MODEL: ${{ inputs.judge_model || 'openai/gpt-4o-mini' }}
        run: |
          cd /tmp/benchmark
          uv run judge \
            --candidates /tmp/benchmark-results/candidates.json \
            --model "$JUDGE_MODEL" \
            --output /tmp/benchmark-results

      - name: Check regression
        run: |
          npx tsx scripts/benchmark-check.ts \
            --results /tmp/benchmark-results \
            --min-precision 0.40 \
            --min-recall 0.30 \
            --min-f1 0.35

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-results-${{ github.run_id }}
          path: /tmp/benchmark-results/
          retention-days: 30
