# Local convenience config kept intentionally aligned with .ai-review.yml.
# Usage: ai-review local --config .ai-review-local.yml --range main...HEAD .
# Keep active settings in parity with .ai-review.yml.
# If you need a temporary local-only override while debugging, uncomment it explicitly,
# verify the behavior you need, then re-comment it before committing.
# Example local-only overrides:
# provider: anthropic
# models:
#   default: claude-sonnet-4-20250514

version: 1
trusted_only: true

provider: openai

passes:
  - name: static
    agents: [semgrep, reviewdog]
    enabled: true
    required: true

  - name: cloud-ai
    agents: [opencode, pr_agent]
    enabled: true

models:
  default: gpt-4.1

limits:
  max_files: 150
  max_diff_lines: 100000
  max_tokens_per_pr: 700000
  max_usd_per_pr: 50.00
  monthly_budget_usd: 500

gating:
  enabled: false
  fail_on_severity: error
