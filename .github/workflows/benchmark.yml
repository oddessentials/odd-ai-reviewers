name: Benchmark

on:
  workflow_dispatch:
    inputs:
      judge_model:
        description: 'Model to use for judging (e.g., openai/gpt-4o-mini)'
        required: false
        default: 'openai/gpt-4o-mini'
  schedule:
    # Weekly: Sunday at 2 AM UTC
    - cron: '0 2 * * 0'

permissions:
  contents: read

jobs:
  benchmark:
    name: External Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Block fork PRs from accessing secrets
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Preflight secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MARTIAN_API_KEY: ${{ secrets.MARTIAN_API_KEY }}
        run: |
          missing=()
          [ -n "${ANTHROPIC_API_KEY}" ] || missing+=("ANTHROPIC_API_KEY")
          [ -n "${MARTIAN_API_KEY}" ] || missing+=("MARTIAN_API_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=Missing benchmark secrets::Missing required benchmark secrets: ${missing[*]}"
            echo "Benchmark preflight failed."
            echo "Missing required secrets:"
            for key in "${missing[@]}"; do
              echo "  - ${key}"
            done
            exit 1
          fi
          echo "Benchmark preflight passed. All required secrets are configured."

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Clone benchmark repo
        run: git clone --depth 1 https://github.com/withmartian/code-review-benchmark.git /tmp/benchmark

      - name: Prepare benchmark environment
        run: |
          mkdir -p /tmp/benchmark-results
          cd /tmp/benchmark/offline
          uv sync --frozen

      - name: Run adapter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          JUDGE_MODEL: ${{ inputs.judge_model || 'openai/gpt-4o-mini' }}
        run: |
          MODEL_DIR="${JUDGE_MODEL//\//_}"
          npx tsx scripts/benchmark-adapter.ts \
            --golden-dir /tmp/benchmark/offline/golden_comments \
            --benchmark-data /tmp/benchmark/offline/results/benchmark_data.json \
            --output "/tmp/benchmark/offline/results/${MODEL_DIR}/candidates.json" \
            --concurrency 2 \
            --timeout-per-pr 300 \
            --max-runtime 6000

      - name: Run judge
        env:
          MARTIAN_API_KEY: ${{ secrets.MARTIAN_API_KEY }}
          JUDGE_MODEL: ${{ inputs.judge_model || 'openai/gpt-4o-mini' }}
          MARTIAN_MODEL: ${{ inputs.judge_model || 'openai/gpt-4o-mini' }}
        run: |
          cd /tmp/benchmark/offline
          uv run judge-comments --tool odd-ai-reviewers --force

      - name: Summarize results
        env:
          JUDGE_MODEL: ${{ inputs.judge_model || 'openai/gpt-4o-mini' }}
        run: |
          MODEL_DIR="${JUDGE_MODEL//\//_}"
          npx tsx scripts/benchmark-summarize.ts \
            --benchmark-data /tmp/benchmark/offline/results/benchmark_data.json \
            --evaluations "/tmp/benchmark/offline/results/${MODEL_DIR}/evaluations.json" \
            --output /tmp/benchmark-results/summary.json \
            --tool odd-ai-reviewers \
            --judge-model "$JUDGE_MODEL"
          cp "/tmp/benchmark/offline/results/${MODEL_DIR}/candidates.json" /tmp/benchmark-results/candidates.json
          cp "/tmp/benchmark/offline/results/${MODEL_DIR}/evaluations.json" /tmp/benchmark-results/evaluations.json
          cp /tmp/benchmark/offline/results/benchmark_data.json /tmp/benchmark-results/benchmark_data.json

      - name: Check regression
        run: |
          npx tsx scripts/benchmark-check.ts \
            --results /tmp/benchmark-results \
            --min-precision 0.40 \
            --min-recall 0.30 \
            --min-f1 0.35

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmark-results-${{ github.run_id }}
          path: /tmp/benchmark-results/
          retention-days: 30
