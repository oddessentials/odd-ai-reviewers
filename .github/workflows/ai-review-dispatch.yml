# AI Review Manual Dispatch Workflow
# Allows manual triggering of AI review on any repository

name: AI Review (Manual)

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
      target_ref:
        description: 'Git ref to review (SHA or branch)'
        required: true
        type: string
      base_ref:
        description: 'Base ref for diff'
        required: true
        type: string
        default: 'main'
      pr_number:
        description: 'PR number (optional, for posting comments)'
        required: false
        type: number

jobs:
  ai-review:
    name: Manual AI Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout review router
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Checkout target repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          path: target
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build router
        run: pnpm --filter ./router build

      - name: Install Semgrep
        # Keep in sync with ai-review.yml and router/Dockerfile
        run: pip3 install semgrep==1.149.0

      - name: Get base SHA
        id: base
        working-directory: target
        env:
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          echo "sha=$(git rev-parse "origin/$BASE_REF")" >> "$GITHUB_OUTPUT"

      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_REF: ${{ inputs.target_ref }}
          BASE_SHA: ${{ steps.base.outputs.sha }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          OWNER=$(echo "$TARGET_REPO" | cut -d'/' -f1)
          REPO=$(echo "$TARGET_REPO" | cut -d'/' -f2)

          set -- --repo target \
            --base "$BASE_SHA" \
            --head "$TARGET_REF" \
            --owner "$OWNER" \
            --repo-name "$REPO"

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "0" ]; then
            set -- "$@" --pr "$PR_NUMBER"
          fi

          node router/dist/main.js review "$@"

      - name: Upload results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: ai-review-manual-${{ github.run_id }}
          path: |
            review-*.json
            review-*.md
          retention-days: 30
